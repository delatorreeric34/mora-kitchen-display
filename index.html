    <style>

  <body>
    <main class="app">
      <header class="header">
        <h1>Kitchen POS Display</h1>
        <p id="status" class="status">Connecting to Firestore...</p>
      </header>

      <section class="columns" aria-live="polite">
        <div class="column">
          <h2 class="column-title">Pending Orders</h2>
          <section id="pending-tickets" class="tickets"></section>
        </div>
        <div class="column">
          <h2 class="column-title">Completed Orders</h2>
          <section id="completed-tickets" class="tickets"></section>
        </div>
      </section>
    </main>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
      import {
        getFirestore,
        collection,
        query,
        where,
        orderBy,
        onSnapshot,
        updateDoc,
      } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

      /**
       * 1) Paste your Firebase project config below.
       * 2) Set CLIENT_ID to the same value your voice-ordering system writes under:
       *    orders/{client_id}/calls/{call_id}
       */
      const firebaseConfig = {
        apiKey: "AIzaSy...",
        authDomain: "ai-voice-agent-14f7e.firebaseapp.com",
        projectId: "ai-voice-agent-14f7e",
        storageBucket: "ai-voice-agent-14f7e.firebasestorage.app",
        messagingSenderId: "1004567405229",
        appId: "1:1004567405229:web:24b80ef62d621abdc7dc24"
      };

      const CLIENT_ID = "naomi_sushi";

      const statusEl = document.getElementById("status");
      const pendingTicketsEl = document.getElementById("pending-tickets");
      const completedTicketsEl = document.getElementById("completed-tickets");

      // Initialize Firebase app + Firestore.
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      // Build query: pending orders only, newest updated_at first.
      // Keep query location under orders/{client_id}/calls and live updates.
      const callsRef = collection(db, "orders", CLIENT_ID, "calls");

      const ordersQuery = query(callsRef, orderBy("updated_at", "desc"));

      // Render helper for one ticket card.
      function buildTicket(orderDoc, isCompleted) {
        const data = orderDoc.data();
        const items = Array.isArray(data.items_ordered) ? data.items_ordered : [];

        const ticket = document.createElement("article");
        ticket.className = "ticket";

        // Ticket aging color logic (only for pending orders)
        if (!isCompleted && data.updated_at) {
          const ageMinutes =
            (Date.now() - new Date(data.updated_at).getTime()) / 60000;
        
          if (ageMinutes > 6) {
            ticket.style.borderColor = "#ef4444";
            ticket.style.background = "#2a1212";
          } else if (ageMinutes > 3) {
            ticket.style.borderColor = "#facc15";
            ticket.style.background = "#2a250e";
          }
        }

        const callId = document.createElement("h2");
        callId.className = "call-id";
        callId.textContent = `CALL: ${orderDoc.id}`;

        // Ticket age label
        let ageLabel = null;
        

        if (!isCompleted && data.updated_at) {
          const ageSeconds =
            Math.floor((Date.now() - new Date(data.updated_at).getTime()) / 1000);
        

          ageLabel = document.createElement("div");
          ageLabel.style.fontSize = "0.95rem";
          ageLabel.style.color = "#c8c8c8";
          ageLabel.textContent = `Age: ${Math.floor(ageSeconds / 60)}m ${ageSeconds % 60}s`;
        }

        const customer = document.createElement("p");
        customer.className = "customer";
        customer.innerHTML = `${data.customer_name || "Unknown customer"}<br>${
          data.customer_phone || "No phone"
        }`;

        const itemsList = document.createElement("ul");
        itemsList.className = "items";

        items.forEach((item) => {
          const itemLi = document.createElement("li");
          itemLi.className = "item";

          const title = document.createElement("div");
          title.className = "item-title";
          const qty = Number(item.quantity) || 1;
          const sizePrefix = item.size ? `${item.size} ` : "";
          title.textContent = `${qty} ${sizePrefix}${item.name || "Unnamed item"}`;
          itemLi.appendChild(title);

          if (details.length > 0) {

              detailLi.textContent = detail;

        if (items.length === 0) {
          const fallback = document.createElement("li");

          itemsList.appendChild(fallback);
        }

        const actionBtn = document.createElement("button");
        actionBtn.className = `action-btn ${isCompleted ? "undo-btn" : "complete-btn"}`;
        actionBtn.type = "button";
        actionBtn.textContent = isCompleted ? "UNDO" : "COMPLETE";
        
        actionBtn.addEventListener("click", async () => {
          actionBtn.disabled = true;
        
          const nextStatus = isCompleted ? "pending" : "completed";
          actionBtn.textContent = isCompleted ? "Undoing..." : "Completing...";
        
          try {
            await updateDoc(orderDoc.ref, { order_status: nextStatus });
          } catch (error) {
            console.error("Failed to update order:", error);
            actionBtn.disabled = false;
            actionBtn.textContent = isCompleted ? "UNDO" : "COMPLETE";
          }
        });
        
      ticket.append(callId, ageLabel, customer, itemsList, actionBtn);
      return ticket;
      }

      // Real-time listener for incoming pending orders.
      function renderEmptyState(container, message) {
        const emptyState = document.createElement("div");
        emptyState.className = "empty";
        emptyState.textContent = message;
        container.appendChild(emptyState);
      }

      // Real-time listener for incoming orders.
      onSnapshot(
        ordersQuery,
        (snapshot) => {
      
          const pendingDocs = [];
          const completedDocs = [];
      
          snapshot.forEach((doc) => {
            const data = doc.data();
      
            if (data.order_status === "completed") {
              completedDocs.push(doc);
            } else {
              pendingDocs.push(doc);
            }
          });
      
          statusEl.textContent =
            `Live: ${pendingDocs.length} pending • ${completedDocs.length} completed`;
      
          pendingTicketsEl.innerHTML = "";
          completedTicketsEl.innerHTML = "";
      
          if (pendingDocs.length === 0) {
            renderEmptyState(pendingTicketsEl, "No pending orders right now.");
          } else {
            pendingDocs.forEach((orderDoc) => {
              pendingTicketsEl.appendChild(buildTicket(orderDoc, false));
            });
          }
      
          if (completedDocs.length === 0) {
            renderEmptyState(completedTicketsEl, "No completed orders yet.");
          } else {
            completedDocs.forEach((orderDoc) => {
              completedTicketsEl.appendChild(buildTicket(orderDoc, true));
            });
          }
      
        },
        (error) => {
          console.error("Firestore listener error:", error);
          statusEl.textContent =
            "Connection error. Check Firebase config + indexes.";
          statusEl.classList.add("error");
        }
      );
    </script>
