<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kitchen POS Display</title>
    <style>
      :root {
        --bg: #111111;
        --surface: #1d1d1d;
        --surface-border: #333333;
        --text: #f8f8f8;
        --muted: #c8c8c8;
        --accent: #22c55e;
        --accent-pressed: #16a34a;
        --danger: #ef4444;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      .app {
        max-width: 1200px;
        margin: 0 auto;
        padding: 1rem;
      }

      .header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.6rem, 2.8vw, 2.3rem);
        letter-spacing: 0.02em;
      }

      .status {
        font-size: 1rem;
        color: var(--muted);
      }

      .status.error {
        color: var(--danger);
      }

      .tickets {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 1rem;
      }

      .ticket {
        background: var(--surface);
        border: 2px solid var(--surface-border);
        border-radius: 14px;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        min-height: 320px;
      }

      .call-id {
        font-size: 1.2rem;
        font-weight: 800;
        margin: 0 0 0.7rem;
        word-break: break-all;
      }

      .customer {
        margin: 0;
        font-size: 1.15rem;
        line-height: 1.35;
      }

      .items {
        list-style: none;
        padding: 0;
        margin: 1rem 0;
        flex: 1;
      }

      .item {
        font-size: 1.2rem;
        margin-bottom: 0.9rem;
      }

      .item-title {
        font-weight: 700;
      }

      .detail-list {
        margin: 0.3rem 0 0 0;
        padding-left: 1.2rem;
        color: var(--muted);
      }

      .detail-list li {
        margin-bottom: 0.25rem;
        font-size: 1.05rem;
      }

      .complete-btn {
        margin-top: auto;
        border: none;
        background: var(--accent);
        color: #001204;
        font-size: 1.25rem;
        font-weight: 800;
        border-radius: 12px;
        padding: 0.95rem;
        width: 100%;
        cursor: pointer;
        touch-action: manipulation;
      }

      .complete-btn:active {
        background: var(--accent-pressed);
      }

      .empty {
        grid-column: 1 / -1;
        background: var(--surface);
        border: 2px dashed var(--surface-border);
        border-radius: 14px;
        padding: 2rem;
        text-align: center;
        font-size: 1.2rem;
        color: var(--muted);
      }

      @media (max-width: 600px) {
        .app {
          padding: 0.75rem;
        }

        .ticket {
          min-height: 280px;
        }

        .complete-btn {
          font-size: 1.15rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Kitchen POS Display</h1>
        <p id="status" class="status">Connecting to Firestore...</p>
      </header>
      <section id="tickets" class="tickets" aria-live="polite"></section>
    </main>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
      import {
        getFirestore,
        collection,
        query,
        where,
        orderBy,
        onSnapshot,
        updateDoc,
      } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

      /**
       * 1) Paste your Firebase project config below.
       * 2) Set CLIENT_ID to the same value your voice-ordering system writes under:
       *    orders/{client_id}/calls/{call_id}
       */
      const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID",
      };

      const CLIENT_ID = "YOUR_CLIENT_ID";

      const statusEl = document.getElementById("status");
      const ticketsEl = document.getElementById("tickets");

      // Initialize Firebase app + Firestore.
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      // Build query: pending orders only, newest updated_at first.
      const callsRef = collection(db, "orders", CLIENT_ID, "calls");
      const pendingOrdersQuery = query(
        callsRef,
        where("order_status", "==", "pending"),
        orderBy("updated_at", "desc")
      );

      // Render helper for one ticket card.
      function buildTicket(orderDoc) {
        const data = orderDoc.data();
        const items = Array.isArray(data.items_ordered) ? data.items_ordered : [];

        const ticket = document.createElement("article");
        ticket.className = "ticket";

        const callId = document.createElement("h2");
        callId.className = "call-id";
        callId.textContent = `CALL: ${orderDoc.id}`;

        const customer = document.createElement("p");
        customer.className = "customer";
        customer.innerHTML = `${data.customer_name || "Unknown customer"}<br>${
          data.customer_phone || "No phone"
        }`;

        const itemsList = document.createElement("ul");
        itemsList.className = "items";

        items.forEach((item) => {
          const itemLi = document.createElement("li");
          itemLi.className = "item";

          const title = document.createElement("div");
          title.className = "item-title";
          const qty = Number(item.quantity) || 1;
          const sizePrefix = item.size ? `${item.size} ` : "";
          title.textContent = `${qty} ${sizePrefix}${item.name || "Unnamed item"}`;
          itemLi.appendChild(title);

          const details = [];
          if (Array.isArray(item.modifiers)) {
            item.modifiers.forEach((modifier) => details.push(`+ ${modifier}`));
          }
          if (Array.isArray(item.customizations)) {
            item.customizations.forEach((customization) =>
              details.push(`* ${customization}`)
            );
          }

          if (details.length > 0) {
            const detailList = document.createElement("ul");
            detailList.className = "detail-list";
            details.forEach((detail) => {
              const detailLi = document.createElement("li");
              detailLi.textContent = detail;
              detailList.appendChild(detailLi);
            });
            itemLi.appendChild(detailList);
          }

          itemsList.appendChild(itemLi);
        });

        if (items.length === 0) {
          const fallback = document.createElement("li");
          fallback.className = "item";
          fallback.textContent = "No items listed";
          itemsList.appendChild(fallback);
        }

        const completeBtn = document.createElement("button");
        completeBtn.className = "complete-btn";
        completeBtn.type = "button";
        completeBtn.textContent = "COMPLETE";

        completeBtn.addEventListener("click", async () => {
          completeBtn.disabled = true;
          completeBtn.textContent = "Completing...";
          try {
            // Mark this order as completed in Firestore.
            await updateDoc(orderDoc.ref, { order_status: "completed" });
          } catch (error) {
            console.error("Failed to complete order:", error);
            statusEl.textContent = "Could not update order. Check console.";
            statusEl.classList.add("error");
            completeBtn.disabled = false;
            completeBtn.textContent = "COMPLETE";
          }
        });

        ticket.append(callId, customer, itemsList, completeBtn);
        return ticket;
      }

      // Real-time listener for incoming pending orders.
      onSnapshot(
        pendingOrdersQuery,
        (snapshot) => {
          statusEl.textContent = `Live: ${snapshot.size} pending order${
            snapshot.size === 1 ? "" : "s"
          }`;
          statusEl.classList.remove("error");

          ticketsEl.innerHTML = "";

          if (snapshot.empty) {
            const emptyState = document.createElement("div");
            emptyState.className = "empty";
            emptyState.textContent = "No pending orders right now.";
            ticketsEl.appendChild(emptyState);
            return;
          }

          snapshot.forEach((orderDoc) => {
            ticketsEl.appendChild(buildTicket(orderDoc));
          });
        },
        (error) => {
          console.error("Firestore listener error:", error);
          statusEl.textContent = "Connection error. Check Firebase config + indexes.";
          statusEl.classList.add("error");
        }
      );
    </script>
  </body>
</html>
